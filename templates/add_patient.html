{% extends "base.html" %}
{% block title %}Add Patient - Patient Records{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Add New Patient</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="age">Age</label>
        <input type="number" id="age" name="age" required>

        <label for="sex">Sex</label>
        <select id="sex" name="sex" required>
            <option value="">-- Select --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label for="blood_pressure">Blood Pressure</label>
        <input type="text" id="blood_pressure" name="blood_pressure" placeholder="e.g. 120/80">

        <label for="cholesterol">Cholesterol</label>
        <select id="cholesterol" name="cholesterol">
            <option value="">-- Select --</option>
            <option value="Normal">Normal</option>
            <option value="Above Normal">Above Normal</option>
            <option value="High">High</option>
        </select>

        <label for="fasting_blood_sugar">Fasting Blood Sugar > 120 mg/dl</label>
        <select id="fasting_blood_sugar" name="fasting_blood_sugar">
            <option value="">-- Select --</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <label for="resting_ecg">Resting ECG</label>
        <select id="resting_ecg" name="resting_ecg">
            <option value="">-- Select --</option>
            <option value="Normal">Normal</option>
            <option value="Abnormal">Abnormal</option>
        </select>

        <label for="exercise_angina">Exercise-Induced Angina</label>
        <select id="exercise_angina" name="exercise_angina">
            <option value="">-- Select --</option>
            <option value="Yes">Yes</option>
            <option value="No">No</option>
        </select>

        <button type="submit">Add Patient</button>
    </form>
</div>
{% endblock %}
