{% extends "base.html" %}
{% block title %}Edit Emergency Contact - Patient Records{% endblock %}
{% block page_title %}Edit Emergency Contact{% endblock %}

{% block content %}
<div class="max-w-md">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold text-foreground tracking-tight">Edit Emergency Contact</h1>
    </div>

    <div class="bg-card border border-border rounded-xl shadow-sm">
        <form method="POST" class="p-6 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label for="name" class="block text-sm font-medium text-foreground mb-1.5">Full Name</label>
                <input type="text" id="name" name="name" value="{{ contact.name }}" required
                       class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
            </div>

            <div>
                <label for="relationship" class="block text-sm font-medium text-foreground mb-1.5">Relationship</label>
                <input type="text" id="relationship" name="relationship" value="{{ contact.relationship }}" required
                       class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-foreground mb-1.5">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{ contact.phone }}" required
                       class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-foreground mb-1.5">Email (optional)</label>
                <input type="email" id="email" name="email" value="{{ contact.email or '' }}"
                       class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors cursor-pointer">
                    Save Changes
                </button>
                <a href="{{ url_for('emergency_contacts_bp.emergency_contacts') }}"
                   class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-lg border border-border bg-background text-foreground hover:bg-accent transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
